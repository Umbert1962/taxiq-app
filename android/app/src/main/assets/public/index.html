  <body class="dark">
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(reg) {
            if (reg.active && reg.active.scriptURL && reg.active.scriptURL.includes('sw.js') && !reg.active.scriptURL.includes('push-sw.js')) {
              reg.unregister().then(function() {
                console.log('[TaxiQ] Old PWA service worker removed');
              });
            }
          });
        });
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
        navigator.serviceWorker.register('/push-sw.js').then(function() {
          console.log('[TaxiQ] Push notification service worker registered');
        }).catch(function(err) {
          console.log('[TaxiQ] Push SW registration skipped:', err.message);
        });
      }
    </script>
  </body>
