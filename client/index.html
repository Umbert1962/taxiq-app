<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="MobileOptimized" content="width" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>TaxiQ - Szybka i wygodna taksówka</title>
    <meta name="description" content="TaxiQ - Zamów taksówkę w kilka sekund. Szybko, wygodnie i bezpiecznie." />
    <meta name="theme-color" content="#0d0d0d" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body class="dark">
    <div id="landscape-block" style="display:none;position:fixed;inset:0;z-index:9999;background:#0a0a0a;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:24px;text-align:center;">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#E6FF3F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
      <span style="color:#E6FF3F;font-size:18px;font-weight:600;font-family:Inter,sans-serif;">Obróć telefon do pionu</span>
      <span style="color:rgba(255,255,255,0.5);font-size:14px;font-family:Inter,sans-serif;">Aplikacja TaxiQ działa w trybie pionowym</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(reg) {
            if (reg.active && reg.active.scriptURL && reg.active.scriptURL.includes('sw.js') && !reg.active.scriptURL.includes('push-sw.js')) {
              reg.unregister().then(function() {
                console.log('[TaxiQ] Old PWA service worker removed');
              });
            }
          });
        });
        if ('caches' in window) {
          caches.keys().then(function(names) {
            names.forEach(function(name) { caches.delete(name); });
          });
        }
        navigator.serviceWorker.register('/push-sw.js').then(function() {
          console.log('[TaxiQ] Push notification service worker registered');
        }).catch(function(err) {
          console.log('[TaxiQ] Push SW registration skipped:', err.message);
        });
      }
    </script>
  </body>
</html>
